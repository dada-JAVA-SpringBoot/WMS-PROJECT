version: '3.8'
services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wms-sql-server
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_LOCAL_PASSWORD}"
    volumes:
      - wms-data:/var/opt/mssql

volumes:
  wms-data: