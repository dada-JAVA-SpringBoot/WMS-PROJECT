server {
    listen 80;
    server_name lib.id.vn www.lib.id.vn;
    return 301 https://$host$request_uri; # Tự chuyển HTTP sang HTTPS
}

server {
    listen 443 ssl;
    server_name lib.id.vn www.lib.id.vn;

    ssl_certificate /etc/letsencrypt/live/lib.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lib.id.vn/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    location /ws {
        proxy_pass http://backend:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
